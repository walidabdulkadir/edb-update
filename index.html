<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="title">
          <p>Employee Database Management</p>
        </div>
        <div class="add-container">
          <button class="add-btn" id="add-btn">Add Employee</button>
        </div>
      </div>
    </header>
    <section class="main-container">
      <div class="employee-list">
        <div class="list-header"><p>Employee List</p></div>
        <hr />
        <ul id="employeeList">
          <!-- <button id="close-btn">X</button> -->
        </ul>
      </div>
      <div class="employee-info">
        <div class="info-header">
          <p>Employee Information</p>
          <hr />
        </div>
        <div id="employeeDetails" class="employee-details">
          <p>Select an employee to view full information.</p>
        </div>
      </div>
    </section>
    <form class="form-container" id="form-container">
      <div class="form-box">
        <h1>Add Employee Detail</h1>
        <label>First Name</label>
        <input type="text" id="firstName" />
        <label>Last Name</label>
        <input type="text" id="lastName" />
        <label>Address</label>
        <input type="text" id="address" />
        <label>Email</label>
        <input type="text" id="email" />
        <label>Phone Number</label>
        <input type="text" id="phone" />
        <label>Date of birth</label>
        <input type="text" id="dob" />
        <label>Choose an image:</label>
        <input type="file" accept="image/*" id="image" />
        <div class="btn">
          <button type="submit" id="submitBtn">Submit</button>
          <button type="button" id="cancelBtn">Cancel</button>
        </div>
      </div>
    </form>
    <script src="script.js"></script>
  </body>
</html>
